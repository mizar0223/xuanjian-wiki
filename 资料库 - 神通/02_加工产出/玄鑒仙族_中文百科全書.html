<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄鉴仙族 — 中文百科全书</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #181b24;
    --bg-card-hover: #1e2230;
    --bg-sidebar: #141720;
    --text: #e0e0e8;
    --text-dim: #8a8da0;
    --text-label: #9ca0b8;
    --accent: #6e8efb;
    --accent-dim: #4a6ad4;
    --accent-glow: rgba(110,142,251,0.15);
    --border: #2a2d3a;
    --border-light: #33374a;
    --tag-bg: #252840;
    --tag-text: #8b9cf7;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Noto Sans SC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar / TOC */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 280px;
    height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
    z-index: 100;
    transition: transform 0.3s;
  }

  .sidebar-header {
    padding: 8px 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .sidebar-search {
    padding: 8px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 7px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .sidebar-search input:focus {
    border-color: var(--accent);
  }

  .sidebar-search input::placeholder {
    color: var(--text-dim);
  }

  .toc-h2-item {
    margin-bottom: 2px;
  }

  .toc-h2-link {
    display: block;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .toc-h2-link:hover, .toc-h2-link.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .toc-h3-group {
    padding: 2px 0 6px;
  }

  .toc-h3-link {
    display: block;
    padding: 4px 20px 4px 36px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toc-h3-link:hover {
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Main content */
  .main {
    margin-left: 280px;
    flex: 1;
    max-width: 900px;
    padding: 40px 48px 80px;
  }

  /* Hero header */
  .hero {
    text-align: center;
    padding: 40px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .hero-title {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hero-desc {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 600px;
    margin: 0 auto;
  }

  .hero-meta {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .hero-tag {
    padding: 4px 14px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 20px;
    font-size: 12px;
  }

  /* Sections */
  .main-section {
    margin-bottom: 48px;
  }

  .section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    padding-bottom: 12px;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--accent-dim);
    position: relative;
  }

  .section-title::before {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 60px;
    height: 2px;
    background: var(--accent);
  }

  .subsection-title {
    font-size: 17px;
    font-weight: 600;
    color: #c0c4e0;
    padding: 12px 16px;
    margin: 24px 0 12px;
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  /* Text content */
  p {
    margin: 8px 0;
    line-height: 1.8;
    font-size: 14.5px;
    color: var(--text);
  }

  .info-line {
    display: flex;
    gap: 4px;
    padding: 2px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .info-label {
    color: var(--text-label);
    white-space: nowrap;
    min-width: 80px;
  }

  .info-value {
    color: var(--text);
  }

  /* Character card */
  .char-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 12px 0;
  }

  .char-card .info-line {
    padding: 1px 0;
  }

  .char-card .info-label {
    min-width: 72px;
  }

  .char-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* Tables */
  .table-wrapper {
    overflow-x: auto;
    margin: 16px 0;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  th {
    background: var(--bg-card);
    color: var(--accent);
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  tr:hover td {
    background: var(--bg-card-hover);
  }

  /* Lists */
  ul, ol {
    padding-left: 24px;
    margin: 8px 0;
  }

  li {
    font-size: 14px;
    margin: 4px 0;
    line-height: 1.7;
    color: var(--text);
  }

  /* Back to top */
  .back-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    z-index: 200;
    transition: opacity 0.2s;
  }

  .back-top.visible {
    display: flex;
  }

  /* Mobile sidebar toggle */
  .sidebar-toggle {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    z-index: 200;
    width: 36px; height: 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .main {
      margin-left: 0;
      padding: 20px 16px 60px;
    }
    .sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-title {
      font-size: 26px;
    }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  /* Collapsible sections */
  .collapse-toggle {
    cursor: pointer;
    user-select: none;
  }

  .collapse-toggle::after {
    content: ' ▾';
    font-size: 12px;
    opacity: 0.6;
  }

  .collapsed .collapse-toggle::after {
    content: ' ▸';
  }

  .section-body {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .section-body.collapsed-body {
    max-height: 0 !important;
  }
</style>
</head>
<body>

<button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<nav class="sidebar">
  <div class="sidebar-header">
    <h1>玄鉴仙族</h1>
    <div class="subtitle">中文百科全书 · 资料库</div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜寻章节..." oninput="filterTOC(this.value)">
  </div>
  <div id="tocContainer">
    <!-- TOC injected by JS -->
  </div>
</nav>

<main class="main">
  <div class="hero">
    <h1 class="hero-title">玄鉴仙族</h1>
    <p class="hero-desc">陆江仙熬夜猝死，残魂却附在了一面满是裂痕的青灰色铜铜镜上，飘落到了浩瀚无垠的修仙世界。</p>
    <div class="hero-meta">
      <span class="hero-tag">家族修仙</span>

      <span class="hero-tag">无系统</span>
      <span class="hero-tag">作者：季越人</span>
    </div>
  </div>

  <div id="contentArea">
    <!-- Content injected by JS -->
  </div>
</main>

<script>
// Load data and render
const sections = [{"type":"h2","content":"作品简介"},{"type":"text","content":"陆江仙熬夜猝死，残魂却附在了一面满是裂痕的青灰色铜镜上，飘落到了浩瀚无垠的修仙世界。凶险难测的大黎山，眉尺河旁小小的村落，一个小家族拾到了这枚镜子，于是传仙道授仙法，开启波澜壮阔的新时代。(家族修仙，不圣母，种田，无系统，群像文)"},{"type":"h2","content":"创作背景"},{"type":"text","content":"《玄鉴仙族》是季越人的首部网文作品，提笔写《玄鉴仙族》最早是出于练笔的动机。刚好那段时间他在读《白鹿原》和《冰与火之歌》，前一本是家族题材，后一本是典型的群像小说，并且有许多超自然元素加持。《玄鉴仙族》结合了两者的特点，以修仙为题材，季越人构建了大战之后相对沉寂压抑的小说氛围，形成独特的世界景观和叙述格调。由于是首部长篇作品，季越人选择了网文连载的方式，既可以便捷地发布，也可以“检测”写作水准。"},{"type":"h2","content":"角色演员介绍"},{"type":"text","content":"本书描述了黎泾李 家的修仙史，故事现已进入家族第九代（第十六世）。"},{"type":"h3","content":"陆江仙"},{"type":"text","content":"身份：月华元府府主"},{"type":"text","content":"境界：不明，疑似道胎之上"},{"type":"text","content":"道号：盈昃"},{"type":"text","content":"仙器：日月两仪玄鉴"},{"type":"text","content":"金性果位：疑似曾持有全部太阴太阳"},{"type":"text","content":"当前状态：器灵"},{"type":"text","content":"简介：穿越者，曾穿越到此方世界之初，疑似看遍了人族发展，曾与少阳魔君论道，后将之擒杀，一分为三。也与道胎巅峰的真螭论道，告诉其须化为龙，致使真螭吞羽蛇，驾驭不住两道果位而死，引发渌解合水一事。此时其身处于青松观中，后开创月华元府，又疑似与昭元仙府开创者魏太祖李乾元有关，给予其明阳果位，在传到末代传人李江群时，据书中真君猜测为尝试突破太阴太阳 ，走出新的一条路而身陨，不知为何元神进入玄鉴之中，后释修南下，李乾元被围攻而死，昭元仙府破灭，李乾元转世身被落霞山所捉，月华元府亦是破灭，在李江群被围攻而死后，又时隔多年，自太虚之中落下，被李家老祖李木田所得，并且失去了穿越后的所有记忆，故事开始。"},{"type":"h3","content":"七世"},{"type":"text","content":"李根水：子李木田，被元家毒死。"},{"type":"h3","content":"八世"},{"type":"text","content":"李木田：父李根水，妻柳林云，为人多虑善断、凶狠冷厉，为父亲、胞弟报仇屠灭村中大户元家，分立李家嫡庶，购置田产，寿尽。"},{"type":"h3","content":"九世"},{"type":"text","content":"李长湖：父李木田，母柳林云，妻任屏儿，子李玄宣。温顺恭谦如良鹿，被元家余孽刺杀。"},{"type":"text","content":"李通崖：筑基前期【浩瀚海】，父李木田，母柳林云，妻柳柔绚，沉静谨慎似蛟蛇，白箓重海长鲸。在江南紫府暗算九世摩诃的棋局里沦为弃子，至死没有选择血气献祭疗伤，剑斩郁萧贵后仙基崩碎而亡。"},{"type":"text","content":"李项平：灵初轮，父李木田，母柳林云，妻田芸，箓气避死延生，奸毒狠厉如饿狼，被山越筑基箓巫咒杀。"},{"type":"text","content":"李尺泾：筑基前期【湖秋月】，父李木田，母柳林云，司元白七弟子，聪慧俊秀是白狐，剑仙，被参渌馥炼成人丹。"},{"type":"h3","content":"十世（玄景）"},{"type":"text","content":"李玄宣（伯）：练气九层，父李长湖，母任屏儿，妻窦氏，妾木芽鹿，谨言慎行，兢兢业业，勤俭持 家。"},{"type":"text","content":"李玄锋（叔）：筑基巅峰【镂金石·天金胄】，父李项平，母田芸，妻宁和棉，外室江渔女，箓气力贯千均。被青池徵调南疆，凶威赫赫，成为众紫府棋子，抱必死之心解决了李家众多隐患敌人并抗下了因果，后服用人丹，第一次南北大战后坐化。"},{"type":"text","content":"李玄岭（仲）：练气三层，父李通崖，母柳柔绚，妻卢婉容，心思缜密，思虑周全，稳重果敢，被法慧打死于边燕山镇虺观。"},{"type":"text","content":"李景恬（叔）：父李项平，母田芸，夫陈冬河，女李清晓，编撰族史，寿尽。"},{"type":"h3","content":"十一世（渊清）"},{"type":"text","content":"李渊修（伯）：承明轮，父李玄宣，母窦氏，大方温和，渊思寂虑、姿态不俗，被郁家江客卿炸死。"},{"type":"text","content":"李渊蛟（季）：筑基中期【泾龙王】，父李玄宣，母木芽鹿，妻萧归鸾，子李曦治，女李月湘，箓气行气吞灵，谨慎多疑、善谋能断、杀性较重，长相狡诈凶恶不似好人，被唐摄都杀于蜃镜洞天。"},{"type":"text","content":"李清虹（仲）：紫府灵修【霄雷】，父李玄岭，母卢婉容，，箓气长空危雀，性格明媚张扬、委婉柔和，无情爱之心，龙君吞雷后化身龙属之雷。"},{"type":"text","content":"李渊云（仲）：父李玄岭，母卢婉容，冠云峰坊市之乱死于裘籍。"},{"type":"text","content":"李渊平（伯）：玉京轮，父李玄宣，母窦氏，妻任氏，子李曦明，因早产导致血气虚弱，先天不足。为人聪慧机敏懂人心，掌权期间，勤俭持家，民丰物阜，身体原因寿尽早死。"},{"type":"text","content":"李清晓（叔）：练气后期，父陈冬河，母李景恬，夫萧宪，子萧暮云。"},{"type":"text","content":"李渊钦（叔）：筑基中期【天金胄】，父李玄锋，母宁和棉。"},{"type":"text","content":"李渊完（伯）：凡人，父李玄宣，子李曦晅，已死。"},{"type":"text","content":"李渊笃（伯）：凡人，父李玄宣，已死。"},{"type":"h3","content":"十二世（曦月）"},{"type":"text","content":"李曦峸（仲）：练气九层，父李渊云，妻田家人，与李长湖相似，宽厚仁爱，可惜天赋不高，突破筑基失败身死。"},{"type":"text","content":"李曦治（季）：筑基巅峰【长霞雾】，箓气彩彻云衢，父李渊蛟，母萧归鸾，妻杨宵儿，子李承淮，妹李月湘，袁湍大弟子。"},{"type":"text","content":"李曦明（伯）（昭景真人）：紫府前期【明阳】，箓气谷风引火，父李渊平，母任氏，师萧元思，妻安家人，丹师。持有红雉冲离焰（离）、·三候戊玄火（真）、·天乌并火（并）三种紫府灵火。"},{"type":"text","content":"李曦峻（仲）：筑基巅峰【松上雪】，箓气明霜松岭，父李渊云，抢明方天石后身死魂未死，被屠钧/濮羽秘密救活。"},{"type":"text","content":"李月湘（季）：练气五层，父李渊蛟，母萧归鸾，兄李曦治，死于第一次南北大战。"},{"type":"text","content":"李曦晅（伯）：凡人，父李渊完，妻任 家人。"},{"type":"text","content":"李曦遏（仲）：凡人，父李渊云，子李承㞧，已死。"},{"type":"h3","content":"十三世（承明）"},{"type":"text","content":"李承辽（仲）：练气九层，父李曦峸，妻胡氏，子李周巍，突破筑基失败身死。"},{"type":"text","content":"李承㞧（仲）：筑基前期【玄雷泊】，父李曦遏，死于司徒末。"},{"type":"text","content":"李明宫（伯）：筑基后期【雉离行】，父李曦晅，母任家人。"},{"type":"text","content":"李承淮（季）：筑基【勿查我】，父李曦治，母杨宵儿，妻丁氏，子李周洛。"},{"type":"text","content":"李承晊（伯）：凡人，父李曦明，子李周瞑，寿尽。"},{"type":"text","content":"李承㫓（伯）：练气四层，女李行赛，被释修变成毒物后被李承盘降伏。"},{"type":"text","content":"李承宰（伯）：凡人，父李曦晅。"},{"type":"text","content":"李承暏（伯）：父李曦晅，子李周宦，已死。"},{"type":"text","content":"李承盘（伯）：怜愍，大欲道，师雀鲤鱼。"},{"type":"text","content":"李行寒父（伯）：青元轮。"},{"type":"h3","content":"十四世（周行）"},{"type":"text","content":"李周昉（伯）：练气七层，子李绛宗，女李阙宜，与周旸/周垦是亲兄弟。"},{"type":"text","content":"李周旸（伯）：练气，与周昉/周垦是亲兄弟，死于郭红渐。"},{"type":"text","content":"李周巍（仲）（明煌真人）：紫府前期【明阳】，箓气明璋日月，父李承辽，母胡氏。出生前陆江仙用金性加持，十三岁练气，天生金瞳自带霸气，公认的白麟，枢阳命数。"},{"type":"text","content":"李周洛（季）：筑基前期【金兽羽】，父李承淮，母丁氏，妻庞云轻，子李绛淳。"},{"type":"text","content":"李周瞑（伯）：筑基前期【谒天门】，父李承晊，妻夏绶鱼。"},{"type":"text","content":"李周垦（仲）：练气前期，由伯脉过继到仲脉与周昉/周旸是亲兄弟，死于浮南。"},{"type":"text","content":"李行寒（伯）：筑基前期【道合真】，夫庄平野。"},{"type":"text","content":"李周达（仲）：筑基中期【玄雷泊】，性格火爆，战斗时经常冲锋在前，继承李承㞧遗产后筑基。"},{"type":"text","content":"李行赛（仲）：灵初轮，父李承㫓，死于浮南。"},{"type":"text","content":"李周逊（仲）：练气，李承㞧遗产候选人之一。"},{"type":"text","content":"李周退（仲）：练气，李承㞧遗产候选人之一。"},{"type":"text","content":"李周宦（伯）：父李承暏，子李绛唔。"},{"type":"h3","content":"十五世（绛阙）"},{"type":"text","content":"李绛邀（仲）：李周巍长子，母许佩玉，白麟命数，受金性影响似妖怪，被关在山上不得见人。"},{"type":"text","content":"李绛迁（仲）：筑基巅峰【大离书】，李周巍次子，母安家人，性格狠毒但重视家族，白蝉命数。"},{"type":"text","content":"李绛垄（仲）：筑基中期【谒天门】，李周巍三子，母陈芍，子李遂还。"},{"type":"text","content":"李绛夏（仲）：筑基前期【谒天门】，李周巍四子，母安 家人。"},{"type":"text","content":"李绛梁（仲）：筑基前期【大离书】，李周巍五子，妻杨阗幽，师崔诀吟。"},{"type":"text","content":"李绛年（仲）：筑基前期【玉庭将】，李周巍六子，长相不佳，外放群夷海峡。"},{"type":"text","content":"李阙宛（伯）：筑基巅峰【侯神殊】，天目灵窍，父李宝驮。"},{"type":"text","content":"李绛淳（季）：练气五层，父李周洛，母庞云轻。"},{"type":"text","content":"李绛宗（伯）：练气八层，父李周昉。"},{"type":"text","content":"李绛唔（伯）：修小室山道统，父李周宦，子李遂宁，死于荒野动乱。"},{"type":"text","content":"李阙宜（伯）：筑基，父李周昉，夫司勋会，师灵岩子。"},{"type":"text","content":"李阙惜（伯）：练气一层，师千璃子。"},{"type":"h3","content":"十六世（遂语）"},{"type":"text","content":"李遂宁（伯）：练气，天素加持（伪）。"},{"type":"text","content":"李遂宽（伯）"},{"type":"text","content":"李遂还（仲）：练气，父李绛垄。"},{"type":"h3","content":"小宗及支脉"},{"type":"text","content":"李汶：筑基前期【庭中卫】。"},{"type":"text","content":"李岨：练气后期，死于第一次南北大战。"},{"type":"text","content":"李䢑：练气中期，死于第一次南北大战。"},{"type":"text","content":"李秋阳：练气，父李承福。"},{"type":"text","content":"李承福：子李秋阳，舅李木田，寿尽。"},{"type":"text","content":"李叶盛：弟李叶生，被李项平所杀。"},{"type":"text","content":"李叶生：兄李叶盛，子李谢文，女李妃若，李项平死后自尽。"},{"type":"text","content":"李谢文：父李叶生，妹李妃若，子李平逸。"},{"type":"text","content":"李妃若：父李叶生，兄李谢文。先为木焦蛮妃子，后嫁给安鹧言。"},{"type":"text","content":"李平逸：父李谢文，李渊修死后以死谢罪。"},{"type":"text","content":"李东堤：诬陷李殊亚。"},{"type":"text","content":"李岸硕：练气，妻陈家人，子李荤，李绛垄手下。"},{"type":"text","content":"李荤：父李岸硕，死于西案血书事件。"},{"type":"text","content":"李宝驮：女李阙宛，子李殊亚。"},{"type":"text","content":"李殊亚：父李宝驮，妹李阙宛。"},{"type":"h3","content":"李家其他"},{"type":"text","content":"李乌梢：筑基巅峰【朝寒雨】。"},{"type":"text","content":"丁威锃：筑基巅峰【殿阳虎】，妻姓马。"},{"type":"text","content":"燕虎：筑基后期【飓鬼阴】。"},{"type":"text","content":"李七云：筑基中期。"},{"type":"text","content":"妙水：筑基中期【归流处】。"},{"type":"text","content":"曲不识：筑基中期【藏纳宫】。"},{"type":"text","content":"白猿：筑基中期【抱石眠】，庆空寺→屠钧门→于家→李家，被李玄宣所救，负责管理灵药。"},{"type":"text","content":"孙柏：筑基中期【潇重林】。"},{"type":"text","content":"司徒库：筑基中期【金兽羽】。"},{"type":"text","content":"夏绶鱼：筑基前期【白樆心】，夫李周瞑。"},{"type":"text","content":"温遗：筑基前期【梭摩岭】，弟温山，死于隋观。"},{"type":"text","content":"温山：筑基前期【梭摩岭】，兄温遗，死于隋观。"},{"type":"text","content":"狄黎由解：筑基前期，第二任北山越王。"},{"type":"text","content":"高戏江（江壶子）：筑基，高家人，寿尽。"},{"type":"text","content":"陈冬河：练气九层，陈二牛四子，妻李景恬，女李清晓。"},{"type":"text","content":"萧归鸾：练气九层，夫李渊蛟，子李曦治，女李月湘，兄萧归图，突破筑基失败身死。"},{"type":"text","content":"唦摩里：练气后期，父木焦蛮，子李寄蛮，第三任东山越之主，死于第一次南北大战。"},{"type":"text","content":"李寄蛮：练气六层，父唦摩里，母李 家旁系，第四任东山越之主。"},{"type":"text","content":"宗彦：练气七层。"},{"type":"text","content":"狄黎光：练气六层。"},{"type":"text","content":"窦氏：练气三层，夫李玄宣。"},{"type":"text","content":"李七郎：练气三层。"},{"type":"text","content":"富解：练气前期，玄岳门→李家，因挑拨离间被孔孤皙劈死。"},{"type":"text","content":"胡氏：练气，夫李承辽，子李周巍。"},{"type":"text","content":"贺九门：练气，义父贺町，炼器师。"},{"type":"text","content":"胡经业：练气。"},{"type":"text","content":"池眺宗：练气，李行寒舅舅。"},{"type":"text","content":"杜斗：练气，曾担任北山越冁关守将。"},{"type":"text","content":"阿会刺：灵初轮。"},{"type":"text","content":"卢婉容：灵初轮，夫李玄岭，突破练气失败后寿尽。"},{"type":"text","content":"柳柔绚：青元轮，夫李通崖，出身泾阳柳家，已死。"},{"type":"text","content":"万天仇：周行轮，原名万天景，万家覆灭后投李，死于青池屠黎夏郡。"},{"type":"text","content":"芮琼措：周行轮，原望月湖东岸芮家家主。"},{"type":"text","content":"任氏：周行轮，夫李渊平，子李曦明。"},{"type":"text","content":"田芸：父田守水，弟田有道，夫李项平，李项平死后郁郁而终。"},{"type":"text","content":"任屏儿：父任平安，夫李长湖，子李玄宣。"},{"type":"text","content":"柳林云：夫李木田，兄柳林峰，出身黎泾柳家。"},{"type":"text","content":"木芽鹿：子李渊蛟，兄木焦蛮，李玄宣七夫人，寿尽。"},{"type":"text","content":"许佩玉：夫李周巍，子李绛邀，死于李绛邀。"},{"type":"text","content":"陈芍：父陈睦峰，母陈睦峰妾室，兄陈鸯，夫李周巍，子李绛垄。"},{"type":"text","content":"丁予箐：父丁威锃。"},{"type":"text","content":"万旗：李绛夏心腹。"},{"type":"text","content":"贺钧"},{"type":"text","content":"蒲心琊"},{"type":"h3","content":"望姓 田家"},{"type":"text","content":"田守水：子田有道，女田芸，李木田从军归来带回的两个兄弟之一，寿尽。"},{"type":"text","content":"田芸：父田守水，弟田有道，夫李项平，李项平死后郁郁而终。"},{"type":"text","content":"田仲青：练气九层，姑奶田芸，突破筑基失败身死。"},{"type":"text","content":"田有道：练气一层，父田守水，姐田芸，子田荣，死于裘籍。"},{"type":"text","content":"田陵：练气，父田荣。"},{"type":"text","content":"田荣：父田有道，子田陵，被婢女刺死。"},{"type":"h3","content":"望姓 陈家"},{"type":"text","content":"陈二牛：出身梨川口，寿尽。家庭"},{"type":"text","content":"陈鸯：筑基中期【泾龙王】，父陈睦峰，母李曦峸庶妹，妹陈芍，子陈噤犀。"},{"type":"text","content":"陈噤犀：筑基前期，父陈鸯。"},{"type":"text","content":"陈冬河：练气九层，陈二牛四子，妻李景恬，女李清晓。"},{"type":"text","content":"陈睦峰：练气后期，师李秋阳，原配李秋阳六女，原配死后娶了李曦峸庶妹，死于第一次南北大战。"},{"type":"text","content":"陈噤豹：已死。"},{"type":"text","content":"陈噤光"},{"type":"text","content":"陈三水：陈二牛长子，被伽尼奚所杀。"},{"type":"text","content":"陈求水：陈二牛次子。"},{"type":"text","content":"陈芍：父陈睦峰，母陈睦峰妾室，兄陈鸯，夫李周巍，子李绛垄。"},{"type":"h3","content":"望姓 任 家"},{"type":"text","content":"任平安：女任屏儿，李木田从军归来带回的两个兄弟之一，驻守泾阳村，病死。"},{"type":"text","content":"任屏儿：父任平安，夫李长湖，子李玄宣。"},{"type":"text","content":"任氏：周行轮，夫李渊平，子李曦明。"},{"type":"text","content":"任霆：外甥女李明宫。"},{"type":"h3","content":"望姓 泾阳柳家"},{"type":"text","content":"柳柔绚：青元轮，夫李通崖，已死。"},{"type":"text","content":"柳眙：练气，死于许霄。"},{"type":"text","content":"柳凌真：周行轮，死于李乌梢。"},{"type":"h3","content":"望姓 黎泾柳家"},{"type":"text","content":"柳林云：夫李木田，兄柳林峰。"},{"type":"text","content":"柳林峰：妹柳林云，寿尽。"},{"type":"text","content":"柳苗土：街溜子，因私自上山被柳林峰清理门户。"},{"type":"h3","content":"望姓 徐家"},{"type":"text","content":"徐三：寿尽，子徐老爷子。"},{"type":"text","content":"徐公明：练气七层，死于第一次南北大战。"},{"type":"h3","content":"望姓 安家"},{"type":"text","content":"安鹧言：练气九层，妻李妃若，寿尽。"},{"type":"text","content":"安思危：筑基中期【庭中卫】，父安鹧言，母李妃若，弟安思明，妻李家人。"},{"type":"text","content":"安玄统：筑基前期【青玉崖】，弟安玄心。"},{"type":"text","content":"安玄心：筑基前期，兄安玄统，死于雀鲤鱼。"},{"type":"text","content":"安思明：练气后期，父安鹧言，母李妃若，兄安思危，妻李家人，死于第一次南北大战。"},{"type":"text","content":"安景明：练气八层，在郁萧贵面前自尽。"},{"type":"text","content":"安鹧宇：玉京轮，安鹧言庶弟，郁家傀儡，被安鹧言凌迟后被李通崖打死。"},{"type":"h3","content":"望姓 许家"},{"type":"text","content":"许文山：难民头子。"},{"type":"text","content":"许霄：练气三层，为李乌梢所杀。"},{"type":"text","content":"许舒目：胎息。"},{"type":"text","content":"许佩玉：夫李周巍，子李绛邀，死于李绛邀。"},{"type":"h3","content":"望姓 窦家"},{"type":"text","content":"窦氏：练气三层，夫李玄宣。家庭"},{"type":"text","content":"窦邑：姑姑窦氏。"},{"type":"h2","content":"势力"},{"type":"h3","content":"万家"},{"type":"text","content":"万华芊：筑基，疑似被迟尉/李恩成害死。"},{"type":"text","content":"万萧华：灵初轮，子万元凯，死于汲家。"},{"type":"text","content":"万元凯：青元轮，父万萧华，死于汲家。"},{"type":"text","content":"万天仓：玄景轮，死于汲家。"},{"type":"text","content":"万天仇：周行轮，原名万天景，万家覆灭后投李，死于青池屠黎夏郡。"},{"type":"h3","content":"汲家"},{"type":"text","content":"汲登齐：练气中期，妹汲登玉，已死。"},{"type":"text","content":"汲登玉：司徒翌侍女，兄汲登齐，子司徒末，汲家被灭后绝望自尽。"},{"type":"h3","content":"卢家"},{"type":"text","content":"卢思嗣：练气七层，寿尽。"},{"type":"text","content":"卢远平：练气，被司徒翌虐杀。"},{"type":"text","content":"卢远陆：练气，死于李通崖。"},{"type":"text","content":"卢婉容：灵初轮，夫李玄岭，突破练气失败后寿尽。"},{"type":"text","content":"卢安宇"},{"type":"h3","content":"丁家"},{"type":"text","content":"丁西定：练气九层。"},{"type":"h3","content":"乌家"},{"type":"text","content":"乌少云：筑基前期。"},{"type":"h3","content":"韩家"},{"type":"text","content":"韩适桢：筑基后期，于群夷海峡被东方长穆所杀。"},{"type":"text","content":"韩适海：筑基前期，兄韩适桢，已死。"},{"type":"text","content":"韩礼：筑基。"},{"type":"h3","content":"费 家"},{"type":"text","content":"费望白：筑基前期【间道锦】，子费逸和，被司元礼斩杀。"},{"type":"text","content":"费清翊：筑基前期【松上雪】，投魔被李家清理门户。"},{"type":"text","content":"费清伊：筑基前期【祢水寒】，父费桐玉，师郁慕仙，夫秦险，子秦敛服。"},{"type":"text","content":"费逸和：练气九层，父费望白，被徵调去倚山城。"},{"type":"text","content":"费桐啸：练气九层，父费逸和，暗恋李清虹，突破筑基失败身死。"},{"type":"text","content":"费桐玉：练气九层，父费逸和，女费清伊，突破筑基失败身死。"},{"type":"text","content":"费望江：练气六层。"},{"type":"text","content":"费桐财：练气五层。"},{"type":"text","content":"费桐庐：灵初轮。"},{"type":"text","content":"费天玄：捡到天拢云南大阵，建立寒云费家，已死。家庭"},{"type":"h3","content":"郁家"},{"type":"text","content":"郁玉封：筑基后期【玉庭将】，被南山翁/陈涛惊/萧初筹/李通崖围杀。"},{"type":"text","content":"郁萧贵：筑基前期，死于李通崖。"},{"type":"text","content":"郁萧瓯：练气九层，郁萧贵大哥，被蒋合干所杀。"},{"type":"text","content":"郁慕高：练气后期，郁萧贵长子，被蒋合干联合郁家人害死。"},{"type":"text","content":"郁慕元：练气中期，郁萧贵次子，为避免暴露身份自杀。"},{"type":"text","content":"郁慕剑：法师，空无道，郁萧贵三子，被五目度化，后死于李曦明/李曦峻。"},{"type":"text","content":"郁慕仙：筑基后期【销金洞】，郁萧贵幼子，师唐元乌，徒费清伊，炼器师，被李渊蛟/李玄锋/屠龙蹇/萧雍灵围杀于蜃镜洞天。"},{"type":"text","content":"郁慕年：练气二层。"},{"type":"text","content":"郁慕锋：练气。"},{"type":"text","content":"郁成宜：郁慕高七子，大孝子。"},{"type":"text","content":"郁慕黎：死于客卿背刺。"},{"type":"text","content":"郁相华：嫡系，外嫁外姓。"},{"type":"text","content":"郁萧棉"},{"type":"text","content":"鲁客卿：蒋合干。"},{"type":"text","content":"江客卿：练气三层，被郁慕元害死。"},{"type":"text","content":"马亥冀：郁家支系，本姓郁，安插在李家的细作。"},{"type":"h3","content":"袁家"},{"type":"text","content":"袁立成：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"袁成盾：筑基巅峰【伏青山】，子袁甫尧，姑姑袁湍，死于群夷海峡。"},{"type":"text","content":"袁护鳄：筑基后期【戊心岩】。"},{"type":"text","content":"袁湍：筑基前期【青宣岳】，司元白四弟子，被困雷云洞天，死于龙君吞雷。"},{"type":"text","content":"袁护远：筑基前期。"},{"type":"text","content":"袁护独：筑基【定元春】，旧伤复发暴毙。"},{"type":"text","content":"袁甫尧：练气后期，父袁成盾。"},{"type":"text","content":"袁护忠：练气，脱离袁家，后被雀鲤鱼度化。"},{"type":"text","content":"袁自滨：死于杨浞。"},{"type":"text","content":"袁甫异"},{"type":"h3","content":"庄家"},{"type":"text","content":"庄成：筑基，子庄平野。"},{"type":"text","content":"庄平野：父庄成，妻李行寒。"},{"type":"text","content":"李行寒：筑基前期【道合真】，夫庄平野。"},{"type":"h3","content":"邓家"},{"type":"text","content":"邓予之：筑基中期【夜光府】，兄邓求之，子邓不言。"},{"type":"text","content":"邓求之：练气，弟邓予之，被参渌馥炼成人丹。"},{"type":"text","content":"邓不言：父邓予之。"},{"type":"h3","content":"于 家"},{"type":"text","content":"于羽威：筑基后期，弟于羽楔，侄于富宇，第一次南北大战期间死于纯一道。家庭"},{"type":"text","content":"于羽楔：筑基【白玉盘】，兄于羽威，好友司元白，死于迟尉。"},{"type":"text","content":"于富宇：练气九层，脱离于家，死于第一次南北大战。"},{"type":"h3","content":"邻谷家"},{"type":"text","content":"邻谷兰映：紫府前期【并鸺】。"},{"type":"text","content":"邻谷霞：筑基巅峰【长霞雾】，子邻谷饶，已死。"},{"type":"text","content":"邻谷饶：筑基巅峰，父邻谷霞，突破紫府失败身死。"},{"type":"text","content":"邻谷依：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"邻谷耽：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"邻谷猎：筑基。"},{"type":"h3","content":"江北王家"},{"type":"text","content":"王霸空：筑基中期，子王解。"},{"type":"text","content":"王渠绾：筑基前期【浮云身】，弟王渠雨。"},{"type":"text","content":"王渠雨：筑基前期，兄王渠绾。"},{"type":"text","content":"王常严：筑基前期，被大慕法界度化。"},{"type":"text","content":"王渠道：丹师。"},{"type":"text","content":"王解：练气，父王霸空。"},{"type":"text","content":"王潇潇：林枫女人。"},{"type":"h3","content":"崔家"},{"type":"text","content":"崔隅山（阳崖真人）：紫府前期【明阳】。"},{"type":"text","content":"明赞真人：紫府【明阳】，已死。"},{"type":"text","content":"崔诀吟：筑基巅峰【长明阶】，徒李绛梁，擅长控制拉扯，为李家尽心尽力，后回崇州突破紫府。"},{"type":"text","content":"崔长傅：筑基后期。"},{"type":"text","content":"崔心盏：练气中期。"},{"type":"text","content":"崔宛晴：练气。"},{"type":"text","content":"崔仙谒"},{"type":"h3","content":"豫阳陈家"},{"type":"text","content":"陈胤（豫水真人）：紫府前期【府水】。"},{"type":"text","content":"陈铉豫：筑基。"},{"type":"h3","content":"沈家"},{"type":"text","content":"玉鸣真人：紫府前期【玉真】，丹师。"},{"type":"text","content":"沈溪：筑基巅峰，女沈雁青。"},{"type":"text","content":"沈雁青：筑基前期【轻雷落】，父沈溪，师紫霈。"},{"type":"h3","content":"倪家"},{"type":"text","content":"翃岩真人：紫府。"},{"type":"h3","content":"萧家"},{"type":"text","content":"萧初庭（初庭真人）：紫府中期【坎水】。"},{"type":"text","content":"萧锦州（衔忧真人）：紫府【坎水】，已死。"},{"type":"text","content":"萧雍灵：筑基巅峰【东羽山】，突破紫府失败身死。"},{"type":"text","content":"萧元思：筑基后期【朱丹参】，司元白三弟子，徒李曦明，丹师。"},{"type":"text","content":"南山翁：筑基巅峰。"},{"type":"text","content":"萧归图：筑基后期，妹萧归鸾。"},{"type":"text","content":"萧初筹：筑基中期【长云暗】，被萧初庭服食。"},{"type":"text","content":"萧暮云：筑基，父萧宪，母李清晓，余山支脉。"},{"type":"text","content":"萧归鸾：练气九层，夫李渊蛟，子李曦治，女李月湘，兄萧归图，突破筑基失败身死。"},{"type":"text","content":"萧如誉：练气九层。"},{"type":"text","content":"萧久庆：练气二层，子萧宪，余山支脉，死于魔修。"},{"type":"text","content":"萧宪：周行轮，父萧久庆，妻李清晓，子萧暮云，余山支脉，死于魔修。"},{"type":"text","content":"萧负：萧归图六孙。"},{"type":"text","content":"萧归乡"},{"type":"text","content":"萧从屿"},{"type":"text","content":"陈涛惊：筑基中期【浩瀚海】，陵峪门余孽，于冠云峰坊市之乱中被四名筑基围杀。"},{"type":"text","content":"李清晓：练气后期，父陈冬河，母李景恬，夫萧宪，子萧暮云。"},{"type":"h3","content":"檀山李 家"},{"type":"text","content":"檀馥真人：紫府。家庭"},{"type":"text","content":"李牧雁：紫府。"},{"type":"text","content":"李睨潭：筑基后期，大父李牧雁。"},{"type":"h3","content":"相李家"},{"type":"text","content":"相李逐云：紫府前期【全丹】。"},{"type":"text","content":"相李石雨：紫府前期【全丹】。"},{"type":"h3","content":"景渤高（是楼）家"},{"type":"text","content":"高服：紫府中期【真火】，勃烈王。"},{"type":"text","content":"是楼营阁：紫府中期【真火】。"},{"type":"text","content":"是楼威：紫府。"},{"type":"text","content":"高方景：筑基。"},{"type":"text","content":"高戏江：筑基，寿尽。"},{"type":"text","content":"是楼崇阳"},{"type":"h3","content":"司马家"},{"type":"text","content":"司元礼（青忽真人）：紫府前期【正木】，兄司元白，脱离青池重建司马家。"},{"type":"text","content":"司通仪：筑基。"},{"type":"text","content":"司勋会：筑基【空应散】，李曦治三弟子，妻李阙宜。"},{"type":"text","content":"司通闻"},{"type":"text","content":"司鸿朗"},{"type":"text","content":"司原岚"},{"type":"text","content":"司勋拢"},{"type":"text","content":"吴蕃：长霄门被灭后投司马。"},{"type":"h3","content":"拓跋家"},{"type":"text","content":"代王：紫府后期，距离五法加身一步之遥。"},{"type":"text","content":"拓跋赐：紫府中期。"},{"type":"text","content":"拓跋重原：筑基，被东方合云虐杀。"},{"type":"text","content":"拓跋岚"},{"type":"text","content":"拓跋长明"},{"type":"h3","content":"颍华王家"},{"type":"text","content":"逍金真君：金丹，【逍金】果位，海内三金之首。"},{"type":"text","content":"颍原（景略）真人：神通巅峰【齐金】，子王寻。"},{"type":"text","content":"王寻：神通，服气养性道【养青冥】，父颍原（景略）真人。"},{"type":"h3","content":"杨家"},{"type":"text","content":"杨金新：金丹【谪炁】，幽阴司判。"},{"type":"text","content":"杨天衙（官玄真人）：紫府，疑似杨金新化身。"},{"type":"text","content":"杨锐仪：紫府中期。"},{"type":"text","content":"杨浞：紫府前期【真炁】。"},{"type":"text","content":"杨宵儿：筑基中期【蕴宝瓶】，夫李曦治，子李承淮，兄杨锐藻。"},{"type":"text","content":"杨锐藻：筑基，十一妹杨宵儿。"},{"type":"text","content":"杨阗幽：筑基，夫李绛梁。"},{"type":"text","content":"李绛梁：筑基前期【大离书】，李周巍五子，妻杨阗幽，师崔诀吟。"},{"type":"text","content":"陈问尧：筑基。"},{"type":"text","content":"司原岚"},{"type":"text","content":"司勋拢"},{"type":"text","content":"郑书严"},{"type":"h3","content":"周朝"},{"type":"text","content":"某位主政帝裔：金丹，【上仪】果位，失踪。"},{"type":"text","content":"真君死后国嗣为晋所绝。"},{"type":"h3","content":"魏国"},{"type":"text","content":"李乾元：金丹巅峰，【明阳】果位，魏太祖，被囚于落霞山。"},{"type":"text","content":"崔彦：金丹，【明阳】上耀余位，昭元仙府，已死。"},{"type":"text","content":"魏元帝：金丹，【明阳】阳极余位，已死。"},{"type":"text","content":"崔？：金丹【明阳】，已死。"},{"type":"text","content":"魏恭帝：紫府【明阳】，白麟，已死。"},{"type":"text","content":"李勋全：紫府【明阳】，太子，被齐帝斩杀，魂魄被囚坟渊。"},{"type":"text","content":"李悬：紫府【明阳】，已死。"},{"type":"text","content":"李广亨：已死。"},{"type":"text","content":"司马钧"},{"type":"h3","content":"宁国"},{"type":"text","content":"天武真君：金丹，【真炁】果位，死在天外。"},{"type":"h3","content":"齐国"},{"type":"text","content":"乞冀叹罗（石苌）：金丹，【晞炁】果位，齐高祖。灭魏后谋取金德，因太元算计失败身死。"},{"type":"h3","content":"梁国"},{"type":"text","content":"拓跋玄郯（天成真君）：金丹，【邃炁】果位，梁太武帝，已死。"},{"type":"text","content":"灭北齐，斩蛟龙杀凤麟立国，被赵/燕灭，梁王落水而死。"},{"type":"h3","content":"赵国"},{"type":"text","content":"父戚延：金丹，【身夔】果位，赵昭武帝，崩于崟城郡。"},{"type":"text","content":"宗嫦：紫府中期【厥阴】，师叔骀悉。"},{"type":"text","content":"公孙碑：紫府【晞炁】。"},{"type":"text","content":"父戚党勒：父戚延死后即位，迎七道入京。"},{"type":"h3","content":"燕国"},{"type":"text","content":"慕容得常：燕王，已死。"},{"type":"text","content":"慕容解：燕宣帝。"},{"type":"text","content":"慕容夏（善夏）：九世摩诃，慈悲道。"},{"type":"text","content":"慕容颜：紫府前期【牝水】。"},{"type":"text","content":"慕容恩：法师，第一次南北大战死于张秋水。"},{"type":"text","content":"慕容武：筑基，被李玄锋射杀。"},{"type":"text","content":"慕容恭：筑基。"},{"type":"h3","content":"吴国"},{"type":"text","content":"萧祠：紫府，原楚国臣子，后从楚国篡夺江南建立吴国，已死。"},{"type":"h3","content":"象雄国/胜白殿"},{"type":"text","content":"西妟魔君：金丹，【少阳】余位，三分少阳之一。"},{"type":"text","content":"胜白道主：紫府。"},{"type":"text","content":"五明之一：紫府【少阳】，丹师。"},{"type":"h3","content":"铁弗国"},{"type":"text","content":"赫连无疆：紫府中期【煞炁】，国主。"},{"type":"text","content":"赫连兀猛：紫府前期【煞炁】。"},{"type":"text","content":"赫连泛：紫府，被围杀。"},{"type":"text","content":"赫连长光：筑基中期，妻刘俏，第一次南北大战死于李玄锋。"},{"type":"text","content":"赫连长宇"},{"type":"text","content":"赫连长应"},{"type":"text","content":"刘俏：筑基前期，夫赫连长光，第一次南北大战死于李清虹。"},{"type":"h3","content":"西婆国"},{"type":"text","content":"复勋（大娑婆王）：紫府前期【瑞炁】，国主。"},{"type":"h3","content":"朱罗国"},{"type":"text","content":"祸阳：紫府前期【离火】，国主。"},{"type":"h3","content":"浮云洞"},{"type":"text","content":"孚斗：筑基后期【木凭春】，洞主，李曦明紫府后被自杀。"},{"type":"text","content":"载行子：筑基，死于李曦明。"},{"type":"text","content":"孚圆：练气，师叔灵龟子，死于虚慕。"},{"type":"text","content":"灵龟子：练气，被李项平持鉴所杀。"},{"type":"h3","content":"密云洞"},{"type":"text","content":"石纹雅（纹虎）：筑基后期【飓鬼阴】，洞主，死于李曦明。"},{"type":"text","content":"平阳子：筑基中期，死于李周巍。"},{"type":"text","content":"王禾：筑基。"},{"type":"h3","content":"梵云洞"},{"type":"text","content":"汪俊（平汪子）：筑基中期【空应散】，洞主。"},{"type":"h3","content":"槐魂殿"},{"type":"text","content":"柏道人：筑基后期【槐荫鬼】，建立槐魂殿，已死。"},{"type":"text","content":"乌癸：筑基中期。"},{"type":"text","content":"黑鼠：筑基前期，已死。"},{"type":"text","content":"黄道人：筑基。"},{"type":"text","content":"田涪：筑基。"},{"type":"h3","content":"戊竹门"},{"type":"text","content":"冲和真人：紫府中期，已死。"},{"type":"h3","content":"鸿雪门"},{"type":"text","content":"李提（官雪真人）：紫府【寒炁】，被薜荔仙剑斩杀。"},{"type":"h3","content":"雪冀门"},{"type":"text","content":"官戌真人：紫府，雪冀门曾经主人。"},{"type":"h3","content":"陵峪门"},{"type":"text","content":"陈玄礼：紫府，打造重明洞玄屏/冲阳辖星宝盘，已死。"},{"type":"text","content":"陈玄祥：紫府，已死。"},{"type":"text","content":"陈涛平：筑基巅峰【浩瀚海】，望月湖坊市之主，曾化名张错天取走蜃镜洞天第七枚玉盒，被三名筑基巅峰围杀于湖上。"},{"type":"h3","content":"沐券门"},{"type":"text","content":"朱宫真人：紫府前期【戊土】，建立沐券门。"},{"type":"text","content":"戴晋权：筑基。"},{"type":"h3","content":"镗金门"},{"type":"text","content":"司徒镗：紫府，建立镗金门，得罪了螭属被打得寿命大损，寿尽。"},{"type":"text","content":"司徒驽：紫府中期，司徒镗次子，寿尽。"},{"type":"text","content":"司徒霍：紫府前期【庚金】。"},{"type":"text","content":"司徒末：筑基巅峰【镂金石】，父司徒翌，母汲登玉，被李周巍斩杀。"},{"type":"text","content":"司徒骏：筑基后期【天金胄】，被炼成庚金三气丹。"},{"type":"text","content":"司徒表：筑基后期，被柏道人做成法器。"},{"type":"text","content":"司徒库：筑基中期【金兽羽】。"},{"type":"text","content":"司徒郴：筑基【焰中乌】，被李玄锋所杀。"},{"type":"text","content":"司徒耳：练气后期，死于垩无。"},{"type":"text","content":"司徒翌：练气，子司徒末，已死。"},{"type":"text","content":"司徒友：胎息，被李玄锋射杀。"},{"type":"text","content":"司徒礼：司徒镗长子，妻孔暖梦，为司徒驽所杀。"},{"type":"text","content":"孔暖梦：夫司徒礼，为司徒末一脉所杀。"},{"type":"text","content":"汲登玉：司徒翌侍女，兄汲登齐，子司徒末，汲 家被灭后绝望自尽。家庭"},{"type":"h3","content":"巫山"},{"type":"text","content":"端木奎：紫府巅峰【上巫】，求金失败身死。"},{"type":"text","content":"狄路天符：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"角中梓：筑基后期，端木奎死后占据巫山，建立北山越，被江雁取而代之。"},{"type":"text","content":"伏代木：筑基后期【降魂闻】，端木奎死后占据大厥庭，死于袁成盾。"},{"type":"text","content":"祝先：筑基前期【清元风】，暴亡。"},{"type":"text","content":"蛰勒：筑基前期，被李乌梢/李渊蛟/祝先围杀。"},{"type":"text","content":"幕宓理：筑基前期【听醒辰】，角中梓手下，被萧元思抓走。"},{"type":"text","content":"句兀：筑基妖物，角中梓坐骑，被萧元思抓走。"},{"type":"text","content":"伽泥奚：筑基前期【应帝王】，木焦蛮异母哥哥，母为奴隶，自尽。"},{"type":"text","content":"忠余歹：练气五层，为救荠木子女自刎。"},{"type":"text","content":"木焦蛮：练气四层，妹木芽鹿，伽泥奚异母弟弟，首任东山越之主，为击退妖物榨干寿命，传位荠木后亡。"},{"type":"text","content":"荠木：练气，父木焦蛮，第二任东山越之主，于唦摩里面前自尽。"},{"type":"text","content":"端都安：练气，师火罗恶。"},{"type":"text","content":"先都：灵初轮，首任北山越王。"},{"type":"text","content":"寺度旬：灵初轮，月光谷守将。"},{"type":"text","content":"重兑：周行轮，死于李周巍。"},{"type":"h3","content":"听雷岛"},{"type":"text","content":"苗浣尊：紫府中期【玄雷】。"},{"type":"text","content":"苗权：筑基后期。"},{"type":"text","content":"苗邺：筑基。"},{"type":"text","content":"苗杜山：已死。"},{"type":"h3","content":"屠钧门"},{"type":"text","content":"屠龙蹇（钧蹇真人）：紫府前期【牡火】，重建屠钧门。"},{"type":"text","content":"阜玄子（李曦峻）：筑基巅峰【松上雪】，箓气明霜松岭，父李渊云，抢明方天石后身死魂未死，被屠钧/濮羽秘密救活，屠钧门掌门。"},{"type":"h3","content":"称昀门（兜玄）"},{"type":"text","content":"张允（常昀真人）：紫府中期【庚金】，金羽宗嫡系，紫府后扮为魔修创立称昀门，又转为正道门派。"},{"type":"text","content":"钟谦（重恭真人）：紫府前期，掌门。"},{"type":"text","content":"王渠绾：筑基前期【浮云身】，弟王渠雨。"},{"type":"text","content":"叱门狄绋：筑基。"},{"type":"text","content":"张怀德：可能筑基。"},{"type":"text","content":"王潇潇：林枫女人。"},{"type":"h3","content":"白邺都仙道（兜玄）"},{"type":"text","content":"白子羽（邺桧真人）：紫府中期【都卫】，建立都仙道。"},{"type":"text","content":"管龚霄：筑基巅峰【南惆水】，妹管灵堞，掌门。"},{"type":"text","content":"管坎：筑基后期【恨江去】，被李周巍喝死。"},{"type":"text","content":"公孙柏范：筑基后期【泾龙王】，弟公孙柏云。"},{"type":"text","content":"宋云白：筑基中期，白邺宋家，林枫女人。"},{"type":"text","content":"管灵堞：筑基【南惆水】，兄管龚霄。"},{"type":"text","content":"赤犊：筑基。"},{"type":"text","content":"渡掣"},{"type":"h3","content":"玄妙观（通玄）"},{"type":"text","content":"素免真人：紫府前期【宝土】，丹师。"},{"type":"text","content":"齐秋心：筑基。"},{"type":"text","content":"费清菲：父费桐庐，姐费清雅，林枫女人。"},{"type":"h3","content":"曲巳山"},{"type":"text","content":"老真人：紫府，炼器师。"},{"type":"text","content":"廖落真人：紫府【合水】。"},{"type":"h3","content":"静怡山"},{"type":"text","content":"玄怡真人：紫府前期。"},{"type":"text","content":"守定：筑基中期【空应散】。"},{"type":"text","content":"白寅子：筑基，原谷烟庙主，坐化后成为净隅功德瓶器灵。"},{"type":"text","content":"孔孤漠"},{"type":"h3","content":"长流山"},{"type":"text","content":"湘淳道姑：紫府中期【牝水】，长流山之主，东方烈云女人。"},{"type":"h3","content":"拜阳山"},{"type":"text","content":"定阳子：紫府前期，炼器师。"},{"type":"h3","content":"全景门"},{"type":"text","content":"燕渡水（临易真人）：紫府前期，古燕国后裔。"},{"type":"h3","content":"赤礁岛（兜玄）"},{"type":"text","content":"郭神通：紫府【并火】，妻天宛，建立赤礁岛，失踪。"},{"type":"text","content":"天宛真人：紫府后期【寒炁】，夫郭神通。"},{"type":"text","content":"檀云真人：紫府前期，郭神通妖兽。"},{"type":"text","content":"郭红渐：筑基巅峰【心期焚】，妹郭红瑶。"},{"type":"text","content":"郭厄：筑基，把自己炼化进六丁并火令。"},{"type":"text","content":"郭红迩：筑基，被林沉胜所杀。"},{"type":"text","content":"郭红瑶：筑基，兄郭红渐，死于李曦峻。"},{"type":"text","content":"郭红康：筑基，死于李曦峻。"},{"type":"h3","content":"玄岳门（通玄）"},{"type":"text","content":"玄光移岳大道，祖师罗垣，周兆子→李必→赵演→孔峡"},{"type":"text","content":"孔燕谿（长奚真人）：紫府前期【艮土】，寿尽。"},{"type":"text","content":"孔婷云：紫府前期【艮土】。"},{"type":"text","content":"孔海应：筑基巅峰【愚赶山】，与张灵舒关系匪浅，突破紫府失败身死。"},{"type":"text","content":"孔孤皙：筑基后期【愚赶山】，兄孔孤离，掌门。"},{"type":"text","content":"孔孤离：筑基后期【愚赶山】，弟孔孤皙，死于纯一道。"},{"type":"text","content":"孔夏详：筑基前期。"},{"type":"text","content":"孔秋妍：筑基前期，嫁入沐券门，育有一子。"},{"type":"text","content":"孔玉：练气九层，为了避免泄露孔海应和富恩信息自裁。"},{"type":"text","content":"孔孤隼：练气九层，孔玉亲侄，死于李玄锋。"},{"type":"text","content":"孔暖梦：夫司徒礼，为司徒末一脉所杀。"},{"type":"text","content":"富恩：筑基巅峰【愚赶山】，突破紫府失败身死。"},{"type":"text","content":"辅钺子：筑基后期【天金胄】，被沐券门害死。"},{"type":"h3","content":"长霄门（兜玄）"},{"type":"text","content":"颜见霄（长霄真人）：紫府后期【上仪】，建立长霄门。"},{"type":"text","content":"成言真人：紫府前期【戊土】，死于李周巍。"},{"type":"text","content":"汉睢真人：紫府，疑似周汉。"},{"type":"text","content":"周汉（旬邑子）：筑基巅峰，徒王伏。"},{"type":"text","content":"王伏（玉伏子）：筑基后期，师周汉，死于衡祝道/望月李 家/豫阳陈家围杀。家庭"},{"type":"text","content":"玉南子，筑基，死于李周巍。"},{"type":"text","content":"云空子：筑基，死于衡祝道。"},{"type":"text","content":"白鬓子：筑基，掌门，长霄门灭门后被青尺剑诛于湖上。"},{"type":"text","content":"庄道人：筑基，死于李周巍。"},{"type":"text","content":"贵衾：筑基，弟成言，死于李周巍。"},{"type":"text","content":"玉云子：练气七层，死于李通崖/灵岩子。"},{"type":"text","content":"玉和子：练气六层，死于李通崖/灵岩子。"},{"type":"h3","content":"大鸺葵观（青玄）"},{"type":"text","content":"娄行真人：紫府后期【并鸺】，剑仙，徒奎祈，被薛殃所杀。"},{"type":"text","content":"林见祈（奎祈真人）：紫府中期【并鸺】，师娄行，阵师，被长霄/卫悬因所杀。"},{"type":"text","content":"林渭（后绋真人）：紫府前期【并鸺】，侄林沉胜。"},{"type":"text","content":"闳览老祖：紫府，师太越。太越离去后执掌修葵宗，改名为大鸺葵观，已死。"},{"type":"text","content":"林沉胜：筑基巅峰。"},{"type":"text","content":"晖余：筑基。"},{"type":"text","content":"费清雅：练气，父费桐庐，妹费清菲，林枫女人。"},{"type":"text","content":"林琊"},{"type":"h3","content":"纯一道（青玄）"},{"type":"text","content":"解逡真人：紫府巅峰【太阴】，师盈昃，建立纯一道，求金失败身死。"},{"type":"text","content":"元商真人：紫府巅峰【太阴】。"},{"type":"text","content":"郗灵醮（扶玹真人）：紫府中期【太阴】。"},{"type":"text","content":"广篌真人：紫府【府水】。"},{"type":"text","content":"郗常（澈鸿真人）：紫府前期【太阴】，大父广篌。"},{"type":"text","content":"郗见宽：筑基【丑癸藏】。"},{"type":"h3","content":"南顺罗阇"},{"type":"text","content":"狄路天桑林：紫府中期，巫箓道，南顺罗阇王。"},{"type":"text","content":"江雁（俞江）：紫府前期，巫箓道，原名李渊渔，父李玄锋，母江渔女，师江伯清，取角中梓而代之。"},{"type":"text","content":"火罗恶：筑基中期。"},{"type":"h3","content":"大黎山妖洞"},{"type":"text","content":"三耳少年：紫府后期【司天】。"},{"type":"text","content":"青谕遣（听府妖王）：紫府中期【司天】。"},{"type":"text","content":"糁君妖王：紫府。"},{"type":"text","content":"白榕：筑基巅峰。"},{"type":"text","content":"路垦：筑基中期【凌云木】。"},{"type":"h3","content":"南火天府（兜玄）"},{"type":"text","content":"陆㼆（南炤真人）：神通巅峰【离火】，服气养性道，南火天府→宛陵宗，求金失败身死。"},{"type":"h3","content":"雷云寺/策雷泊云法道（兜玄）"},{"type":"text","content":"堰羊寺宫首徒：建立雷云寺。"},{"type":"text","content":"听鸣尊者：金丹，【玄雷】听鸣余位，被太元/北嘉杀害于雷云洞天。"},{"type":"h3","content":"东离宗"},{"type":"text","content":"崔幕（东离真人）：紫府巅峰，昭元仙府→东离宗，暴亡。"},{"type":"text","content":"东火真人：紫府巅峰，已死。"},{"type":"text","content":"李广涪：留下华阳王钺。"},{"type":"h3","content":"堰羊寺宫（兜玄）"},{"type":"text","content":"参堰子（大至禅天参堰）：至少金丹【青宣】，建立堰羊寺宫，道胎记名弟子，徒苏悉空。尝试仙释合一，失了心智化作堰山。"},{"type":"text","content":"堰羊寺宫首徒：建立雷云寺。"},{"type":"text","content":"玄羊真人：紫府。"},{"type":"h3","content":"通玄宫（通玄）"},{"type":"text","content":"须相真君：金丹，【宝土】果位。"},{"type":"text","content":"吕稗：紫府巅峰【艮土】，徒罗垣，求金失败身死。"},{"type":"h3","content":"宛陵宗（兜玄）"},{"type":"text","content":"重沅真君：金丹，将大衍天素书镇压在宛陵天。"},{"type":"text","content":"林衡江：紫府巅峰，剑仙，封闭宛陵天后灭门自刎，宛陵天开启后尸体复活。"},{"type":"text","content":"司马椴：宛陵天不去峰，已死。"},{"type":"h3","content":"万昱剑门（青玄）"},{"type":"text","content":"太昱真君：金丹，【兑金】果位，师盈昃，被太元害死。"},{"type":"text","content":"天角真人：紫府巅峰【角木】，玄角宝穗松。"},{"type":"text","content":"李袂（凌袂真人）：紫府中期，徒程稿。"},{"type":"text","content":"程久问：紫府。"},{"type":"text","content":"程留行：紫府，建立万昱剑门，已死。"},{"type":"text","content":"顾庞：筑基巅峰。"},{"type":"text","content":"程稿：筑基巅峰，师凌袂，突破紫府被干扰失败身死。"},{"type":"text","content":"程勉抚：筑基，已死。"},{"type":"text","content":"程今铸：筑基，炼器师。"},{"type":"text","content":"程式恩：死于李玄锋。"},{"type":"text","content":"程绪华"},{"type":"h3","content":"紫烟门（青玄）"},{"type":"text","content":"太栩真君：金丹，【紫炁】果位，师盈昃，已死。"},{"type":"text","content":"闻清昼（紫霂真人）：紫府巅峰【紫炁】。"},{"type":"text","content":"阚絮雨（紫霈真人）：紫府巅峰【紫炁】，求金失败身死。"},{"type":"text","content":"易殊袖（汀兰真人）：紫府前期【紫炁】，师紫霈，阵师。"},{"type":"text","content":"阚紫玉（文清真人）：紫府前期【紫炁】。"},{"type":"text","content":"延黔真人：紫府前期【明阳】，师元径，紫气峰，重孙灵岩子，被清理门户。"},{"type":"text","content":"元径真人：紫府，徒延黔，已死。"},{"type":"text","content":"千璃子：筑基巅峰【蕴宝瓶】，楚逸女人，牧座峰。"},{"type":"text","content":"闻武：筑基后期，师千璃子，牧座峰。"},{"type":"text","content":"灵岩子：筑基，紫气峰。"},{"type":"text","content":"空钰子：筑基。"},{"type":"text","content":"李阙宜：筑基，父李周昉，夫司勋会，师灵岩子，紫气峰。"},{"type":"text","content":"卫丹莺：筑基。"},{"type":"text","content":"曹处：筑基，徒丁木，系铃峰。"},{"type":"text","content":"李阙惜：练气一层，师千璃子，牧座峰。"},{"type":"text","content":"丁木：师曹处，系铃峰。"},{"type":"text","content":"择桂：兔妖。"},{"type":"h3","content":"衡祝道（青玄）"},{"type":"text","content":"太祝真君：金丹，【衡祝】果位，师盈昃，失踪。"},{"type":"text","content":"衍确真人：紫府后期【衡祝】，丹师，已死。"},{"type":"text","content":"衡离真人：紫府后期，炼器师。"},{"type":"text","content":"毕成鄄（南樽真人）：紫府前期。"},{"type":"text","content":"毕衡星（衡星真人）：紫府【衡祝】，丹师。"},{"type":"text","content":"毕钰妆：筑基后期。"},{"type":"text","content":"毕岹俞：筑基。"},{"type":"text","content":"冯冲：筑基，弟冯宇。"},{"type":"text","content":"冯宇：筑基，兄冯冲。"},{"type":"h3","content":"九邱山（青玄）"},{"type":"text","content":"元道真人：紫府巅峰，丹师。"},{"type":"text","content":"曹惜言（苓渡真人）：紫府中期。"},{"type":"text","content":"虞兑：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"澹台慕明：筑基后期【炁引池】。"},{"type":"h3","content":"太室山"},{"type":"text","content":"灴鸾：金丹，【灴火】果位。"},{"type":"text","content":"危好：紫府【灴火】，灴鸾之子。"},{"type":"h3","content":"合真道（青玄）"},{"type":"text","content":"上元真君：金丹前期，【玉真】果位，剑仙，建立合真道。"},{"type":"text","content":"年懿：筑基，师上元。"},{"type":"h3","content":"北溟殿"},{"type":"text","content":"北耀娘娘：金丹，【少阳】余位，三分少阳之一。"},{"type":"h3","content":"北寰宗"},{"type":"text","content":"荒余：紫府巅峰【灴火】。"},{"type":"text","content":"谢湛昌：筑基后期，金丹后裔。"},{"type":"h3","content":"长怀山（青玄）"},{"type":"text","content":"庆长怀（太益真君）：金丹后期，师盈昃。"},{"type":"text","content":"庆棠因（平阌真人）：紫府巅峰【真炁】，求金失败，利用真炁金性转世。"},{"type":"text","content":"庆济方（咨午真人）：紫府中期。"},{"type":"text","content":"庆濯（观澜真人）：紫府前期。"},{"type":"h3","content":"修越宗（青玄）"},{"type":"text","content":"太越真君：金丹中期，【修越】果位，师盈昃，借赵灭梁登得果位，建立修葵宗与修越宗。"},{"type":"text","content":"上元真人（金丹之前）：紫府巅峰【玉真】，剑仙。"},{"type":"text","content":"洞台真人：紫府，师太越，与太越建立修越宗，已死。"},{"type":"h3","content":"金羽宗（通玄）"},{"type":"text","content":"张元禹（太元真君）：金丹前期，【兑金】果位。"},{"type":"text","content":"张秋水（秋水真人）：紫府巅峰【全丹】。"},{"type":"text","content":"天炔真人：紫府中期。"},{"type":"text","content":"张允（常昀真人）：紫府中期【庚金】，金羽宗嫡系，紫府后扮为魔修创立称昀门，又转为正道门派。"},{"type":"text","content":"天霍真人：紫府前期，父张易革，丹师。"},{"type":"text","content":"张天元（天元真人）：紫府，已死。"},{"type":"text","content":"天垌真人：紫府。"},{"type":"text","content":"张易革：紫府，子天霍。"},{"type":"text","content":"张端砚：筑基巅峰【金窍心】，大父张允。"},{"type":"text","content":"苏晏：筑基【泾龙王】，丹师。"},{"type":"h3","content":"青池宗（青玄）"},{"type":"text","content":"杜青（太青真君）：金丹前期，【渌水】果位，师盈昃。"},{"type":"text","content":"隋观真人：紫府巅峰【渌水】，疑似杜青化身。"},{"type":"text","content":"迟瑞：紫府巅峰【渌水】，求金失败身死。"},{"type":"text","content":"迟尉：紫府巅峰【渌水】，求金失败身死。"},{"type":"text","content":"司伯修（元修真人）：紫府巅峰【正木】，求金失败身死。"},{"type":"text","content":"迟步梓（步梓真人）：紫府后期【渌水】，步梓峰。"},{"type":"text","content":"唐元乌（元乌真人）：紫府中期，子唐摄城，炼器师，元乌峰，寿尽。"},{"type":"text","content":"宁迢宵（元素真人）：紫府前期【渌水】，洞泉峰，寿尽。"},{"type":"text","content":"宁婉（秋湖真人）：紫府前期【寒炁】，阵师，月湖峰。"},{"type":"text","content":"宁闻月：紫府【太阴】，月湖峰，已死。"},{"type":"text","content":"迟炙云：筑基巅峰，弟迟炙烟，前宗主，突破紫府时被李阚/李象业害死。"},{"type":"text","content":"迟步桦：筑基巅峰，死于李曦治。"},{"type":"text","content":"李恩成：筑基巅峰，父李提，子李泉涛，弟李恩熙，丹师，府辰峰，突破紫府失败身死。"},{"type":"text","content":"唐摄城：筑基巅峰，父唐元乌，炼器师，元乌峰，突破紫府失败身死。"},{"type":"text","content":"唐摄都：筑基巅峰，元乌峰，叛逃投释，于第一次南北大战被李玄锋所杀。"},{"type":"text","content":"唐摄郡：筑基巅峰，元乌峰，突破紫府失败身死。"},{"type":"text","content":"余肃：筑基巅峰，元乌峰，死于第一次南北大战。"},{"type":"text","content":"莫沉：筑基巅峰，突破紫府失败身死。"},{"type":"text","content":"澹台近：筑基巅峰，前宗主。"},{"type":"text","content":"邻谷霞：筑基巅峰【长霞雾】，子邻谷饶，已死。"},{"type":"text","content":"邻谷饶：筑基巅峰，父邻谷霞，突破紫府失败身死。"},{"type":"text","content":"李玄锋：筑基巅峰【镂金石·天金胄】，父李项平，母田芸，妻宁和棉，外室江渔女，箓气力贯千均。被青池徵调南疆，凶威赫赫，成为众紫府棋子，抱必死之心解决了李 家众多隐患敌人并抗下了因果，后服用人丹，第一次南北大战后坐化。家庭"},{"type":"text","content":"李曦治：筑基巅峰【长霞雾】，箓气彩彻云衢，父李渊蛟，母萧归鸾，妻杨宵儿，子李承淮，妹李月湘，袁湍大弟子，究天阁。"},{"type":"text","content":"宁和远：筑基后期，姐宁和棉，洞泉峰，死于第一次南北大战。"},{"type":"text","content":"郁慕仙：筑基后期【销金洞】，郁萧贵幼子，师唐元乌，徒费清伊，炼器师，元乌峰，被李渊蛟/李玄锋/屠龙蹇/萧雍灵围杀于蜃镜洞天。"},{"type":"text","content":"于羽威：筑基后期，弟于羽楔，侄于富宇，盘气峰，第一次南北大战期间死于纯一道。"},{"type":"text","content":"乌卫白：筑基后期，死于李曦治。"},{"type":"text","content":"袁护鳄：筑基后期【戊心岩】，怜峰，太遏岛主。"},{"type":"text","content":"楚明炼：筑基后期，侄孙楚逸，炼器师，宁家客卿。"},{"type":"text","content":"吠罗牙：筑基后期【勿查我】。"},{"type":"text","content":"林乌宁：筑基后期，师宁婉，徒庞云轻，前宗主。"},{"type":"text","content":"全祎：筑基中期【好功箓】，崚河峰，第一次南北大战期间死于拓跋重原。"},{"type":"text","content":"迟炙虎：筑基中期，死于李曦治。"},{"type":"text","content":"夏云：筑基中期，撷气峰，死于李曦治。"},{"type":"text","content":"赵福：筑基中期，死于李曦治。"},{"type":"text","content":"李泉涛：筑基中期【合黎渊】，父李恩成，舅于羽威，妻司通仪妹妹，府辰峰。"},{"type":"text","content":"邓予之：筑基中期【夜光府】，兄邓求之，子邓不言，原截峰。"},{"type":"text","content":"李渊钦：筑基中期【天金胄】，父李玄锋，母宁和棉，撷气峰。"},{"type":"text","content":"杨宵儿：筑基中期【蕴宝瓶】，夫李曦治，子李承淮，兄杨锐藻，究天阁。"},{"type":"text","content":"宁和靖：筑基前期，母迟家嫡女，远刑峰，死于邻谷饶。"},{"type":"text","content":"袁湍：筑基前期【青宣岳】，司元白四弟子，青穗峰，被困雷云洞天，死于龙君吞雷。"},{"type":"text","content":"李尺泾：筑基前期【湖秋月】，父李木田，母柳林云，司元白七弟子，聪慧俊秀是白狐，剑仙，青穗峰，被参渌馥炼成人丹。"},{"type":"text","content":"费清伊：筑基前期【祢水寒】，父费桐玉，师郁慕仙，夫秦险，子秦敛服，元乌峰。"},{"type":"text","content":"于羽楔：筑基【白玉盘】，兄于羽威，好友司元白，灵陡峰，死于迟尉。"},{"type":"text","content":"迟炙烟：筑基，子迟顼骁，兄迟炙云，元乌峰，死于第一次南北大战。"},{"type":"text","content":"迟良哲：筑基，宏达峰，死于第一次南北大战。"},{"type":"text","content":"迟栋清：筑基，死于第一次南北大战。"},{"type":"text","content":"迟符泊：筑基，已死。"},{"type":"text","content":"迟符举：筑基，第一次南北大战期间死于安淮天。"},{"type":"text","content":"迟天星：筑基，第一次南北大战期间死于安淮天。"},{"type":"text","content":"赵停归：筑基，宁婉大弟子，月湖峰，第一次南北大战死于慕容恭。"},{"type":"text","content":"宁和棉：筑基【洞泉声】，弟宁和远，夫李玄锋，子李渊钦。"},{"type":"text","content":"余修贤：筑基，炼器师，元乌峰，死于郭厄。"},{"type":"text","content":"宁和德：筑基，仙贡司。"},{"type":"text","content":"秦险：筑基，妻费清伊，子秦敛服，宗主，死于杨浞。"},{"type":"text","content":"袁成照：筑基，师袁湍，青穗峰，失踪。"},{"type":"text","content":"全玉缎：筑基【好功箓】，李曦治大弟子，究天阁。"},{"type":"text","content":"赵君威：筑基，李曦治二弟子，究天阁。"},{"type":"text","content":"长天道人：筑基【秘白汞】，长天峰祖师，已死。"},{"type":"text","content":"张灵舒：筑基【秘白汞】，长天峰，与孔海应关系匪浅，死于邺桧。"},{"type":"text","content":"宋方山：筑基，死于迟尉。"},{"type":"text","content":"于富宇：练气九层，灵陡峰，脱离于 家，死于第一次南北大战。家庭"},{"type":"text","content":"迟顼骁：练气二层，父迟炙烟，前宗主，死于秦险。"},{"type":"text","content":"邓求之：练气，弟邓予之，元乌峰，被参渌馥炼成人丹。"},{"type":"text","content":"迟符玄：练气。"},{"type":"text","content":"李阚：父李泉涛。"},{"type":"text","content":"李象业：父李泉涛。"},{"type":"text","content":"邓不言：父邓予之。"},{"type":"text","content":"庞云轻：夫李周洛，师林乌宁，子李绛淳。"},{"type":"text","content":"秦敛服：父秦险，母费清伊。"},{"type":"text","content":"宁鼎伯"},{"type":"text","content":"迟步杺"},{"type":"h3","content":"北宫玄雷法道（兜玄）"},{"type":"text","content":"桓暄仙君：【玄雷】果位，前往天外。"},{"type":"h3","content":"观榭（通玄）"},{"type":"text","content":"观化天楼道，紫台玄榭宗"},{"type":"text","content":"蒯离（少阳魔君）：道胎，【少阳】果位，于分蒯岛被盈昃一分为三。"},{"type":"text","content":"卫悬因：紫府后期【厥阴】，赵国国师。"},{"type":"text","content":"戚览堰：紫府中期【角木】。"},{"type":"h3","content":"蓬莱"},{"type":"text","content":"初伏仙君：【青宣】果位，借【宣土】空证【青宣】，前往天外。"},{"type":"text","content":"濮羽真人：紫府，渠海宗宗主。"},{"type":"text","content":"滇兴真人：紫府。"},{"type":"h3","content":"螭属"},{"type":"text","content":"真螭：道胎巅峰，【合水】果位，为化龙吞羽蛇，七年后诞下六合水（余位）三渌水（闰位）九子，被九子分食。"},{"type":"text","content":"东方日居（东海龙王）：金丹巅峰，【合水】果位，真螭长子，死于世间第一位剑仙。"},{"type":"text","content":"真螭第四子：金丹，【合水】余位，被听鸣斩杀证道。"},{"type":"text","content":"东方填业：金丹，【合水】余位，真螭第七子，死于拓跋玄郯。"},{"type":"text","content":"真螭第八子：金丹，【渌水】闰位，本体羽蛇，被螭属钉杀于朱渌海。"},{"type":"text","content":"东方月诸（西海龙王）：金丹，真螭九子之一，已死。"},{"type":"text","content":"东方未明（北嘉龙君）：金丹巅峰，【合水】果位，真螭九子之一。"},{"type":"text","content":"？？龙君：金丹，真螭九子之一。"},{"type":"text","content":"东方未晞（晞阳龙君）：金丹，【晞炁】闰位，三分少阳之一。"},{"type":"text","content":"东方游：紫府巅峰【合水】，求金失败身死。"},{"type":"text","content":"东方烈云（备海龙王）：紫府巅峰【合水】，父东方游，白龙祧之主。"},{"type":"text","content":"礁海龙王：紫府后期【寒炁】，黑龙祧。"},{"type":"text","content":"东方长穆（穆海龙王）：紫府【合水】，父北嘉，东方游死后突破紫府。"},{"type":"text","content":"全崇龙王：紫府。"},{"type":"text","content":"津海龙王：紫府。"},{"type":"text","content":"绪水妖王：紫府。"},{"type":"text","content":"馥心：紫府。"},{"type":"text","content":"兆和龙女"},{"type":"text","content":"东方合云：紫府灵修，螭裔之云，龙君成就果位时第一口吐息所化。"},{"type":"text","content":"李清虹（列海龙王）：紫府灵修【霄雷】，父李玄岭，母卢婉容，，箓气长空危雀，性格明媚张扬、委婉柔和，无情爱之心，龙君吞雷后化身龙属之雷。"},{"type":"text","content":"东方隘：死于紫霈。"},{"type":"text","content":"东方鼎矫：筑基巅峰，白龙祧太子，父东方烈云，弟东方鼎远。"},{"type":"text","content":"东方鼎远：筑基【泾龙王】，父东方烈云，兄东方鼎矫。"},{"type":"text","content":"云蛸子：筑基后期【瑞气云】，被虺药/虺二/空衡/李清虹围杀。"},{"type":"text","content":"应和白：筑基后期，北锦江王，碧颈蛟。"},{"type":"text","content":"虺二：筑基中期，虺药2367弟。"},{"type":"text","content":"虺药：筑基，藻中虺族，朱南蛟宫，鼎远龙子手下。"},{"type":"text","content":"冉乌：筑基。"},{"type":"h3","content":"青松观（青玄）"},{"type":"text","content":"盈昃：至少道胎，【太阳】果位，同时身具太阴。"},{"type":"text","content":"某火德真君：金丹，记载不详。"},{"type":"text","content":"兑金真君：金丹，亡于蒯离。"},{"type":"text","content":"重明六子：太越，太益，太昱，太栩，太祝，太青。"},{"type":"h3","content":"月华元府（青玄）"},{"type":"text","content":"府君：至少道胎，【太阴】果位，徒李江群。"},{"type":"text","content":"上任【玉真】：道胎，世间第二位剑仙，失踪。"},{"type":"text","content":"玄谙：金丹。"},{"type":"text","content":"李江群（洞骅真人）：紫府巅峰【太阴】，剑仙，师府君，被青池宗/金羽宗/鸿雪门/戊竹门/离炽门围杀于望月湖上。"},{"type":"h3","content":"落霞山（通玄）"},{"type":"text","content":"道胎，【虹霞】果位。"},{"type":"text","content":"金丹，【戊土】余位。"},{"type":"text","content":"薛殃：紫府巅峰【虹霞】。"},{"type":"h3","content":"阴司（兜玄）"},{"type":"text","content":"杨金新（杨判）：金丹【谪炁】，浙南司。"},{"type":"text","content":"汤戍（汤判）：金丹。"},{"type":"text","content":"江判：金丹。"},{"type":"h3","content":"北释"},{"type":"text","content":"大至禅天阿阇梨：世尊。"},{"type":"text","content":"苏悉空：世尊，师大至禅天参堰，【华炁】果位，前往天外。"},{"type":"text","content":"释迦理：世尊，前往天外。"},{"type":"text","content":"大至禅天参堰（参堰子）：至少金丹【青宣】，建立堰羊寺宫，道胎记名弟子，徒苏悉空。尝试仙释合一，失了心智化作堰山。"},{"type":"text","content":"大悲善乐莲世相：法相。"},{"type":"text","content":"慈悲六道观世相：法相。"},{"type":"text","content":"怒目四魔帝刹相：法相，状态不佳。"},{"type":"text","content":"孔雀长子：父母𫛨乌/大孔雀，从大孔雀处得从欲并火。"},{"type":"text","content":"净盏：九世摩诃，忿怒道，被九名紫府围杀后被上元斩杀。"},{"type":"text","content":"善夏（慕容夏）：九世摩诃，慈悲道。"},{"type":"text","content":"堇莲：八世摩诃，善乐道。"},{"type":"text","content":"悲顾：七世摩诃，慈悲道，出身辽河寺。"},{"type":"text","content":"遮卢：六世摩诃，空无道，浊空摩诃量力。"},{"type":"text","content":"净海：六世摩诃，大倥海寺主。"},{"type":"text","content":"雀鲤鱼：六世摩诃，大欲道，孔雀，曾修【并火】至少到紫府后期，徒羚跐。"},{"type":"text","content":"毗加：五世摩诃，大欲道，亡于娄行。"},{"type":"text","content":"法常：五世摩诃，大慕法界，白马寺。"},{"type":"text","content":"筵白：四世摩诃，大慕法界。"},{"type":"text","content":"骀悉：三世摩诃，空无道，曾修【厥阴】。"},{"type":"text","content":"奴孜：一世摩诃，大欲道。"},{"type":"text","content":"业壬：摩诃，出身辽河寺。"},{"type":"text","content":"宝磬：摩诃，大倥海寺。"},{"type":"text","content":"息婆：摩诃，大欲道。"},{"type":"text","content":"广蝉：摩诃，大慕法界，魏李。"},{"type":"text","content":"欲海摩诃量力：摩诃，大欲道。"},{"type":"text","content":"明慧：怜愍，善乐道，金莲座下。"},{"type":"text","content":"五目：怜愍，空无道，金莲座下。"},{"type":"text","content":"赤罗：怜愍，空无道，金莲座下。"},{"type":"text","content":"虚妄：怜愍，空无道，金莲座下。"},{"type":"text","content":"女咲：怜愍，大欲道，发慧座下，被李曦明/司元礼镇压后被李周巍斩杀。"},{"type":"text","content":"羽色：怜愍，慈悲道，发慧座下，孔雀，大赐铜彩寺，被迟步梓献祭。"},{"type":"text","content":"羽宽：怜愍，慈悲道，孔雀，大赐铜彩寺住持。"},{"type":"text","content":"羽广：怜愍，慈悲道，孔雀，大赐铜彩寺，被迟步梓献祭。"},{"type":"text","content":"奴焰：怜愍，大欲道。"},{"type":"text","content":"了空：怜愍，空无道，秦玲寺。"},{"type":"text","content":"屏灵：怜愍，空无道。"},{"type":"text","content":"拔山：怜愍，大欲道。"},{"type":"text","content":"铸真：怜愍，大倥海寺。"},{"type":"text","content":"华空：怜愍。"},{"type":"text","content":"羚跐（李承盘）：怜愍，大欲道，师雀鲤鱼。"},{"type":"text","content":"伏匣：怜愍→法师，忿怒道，北伏魔寺，度化空衡失败后自行坐化。"},{"type":"text","content":"伏言：辽河寺（空言）→忿怒道，六师弟空衡，北伏魔寺住持。"},{"type":"text","content":"空衡：法师，辽河寺，三师兄空言，修北释尊道，凡人化鹿事件后离开李 家。家庭"},{"type":"text","content":"虚慕（郁慕剑）：法师，空无道，郁萧贵三子，被五目度化，后死于李曦明/李曦峻。"},{"type":"text","content":"牟陀：法师，师弟垩无，忿怒道，秦玲寺，被李玄锋射杀。"},{"type":"text","content":"垩无：法师，师兄牟陀，忿怒道，秦玲寺，被李玄锋射杀。"},{"type":"text","content":"愚心：法师，大欲道。"},{"type":"text","content":"愚干：法师，大欲道，于第一次南北大战被李玄锋杀回释土。"},{"type":"text","content":"略金：法师，大慕法界，白马寺。"},{"type":"text","content":"虚安：法师，空无道，于第一次南北大战被李玄锋杀回释土。"},{"type":"text","content":"虚莫：法师，空无道，于第一次南北大战被李玄锋杀回释土。"},{"type":"text","content":"袈衲：法师。"},{"type":"text","content":"王常严：筑基前期，被大慕法界度化。"},{"type":"text","content":"袁护忠：练气，脱离袁家，后被雀鲤鱼度化。"},{"type":"h3","content":"其他"},{"type":"text","content":"共顼：仙君。"},{"type":"text","content":"祝昊：仙君。"},{"type":"text","content":"世间第一位剑仙：空证【剑道】果位，斩杀两位木德果位。"},{"type":"text","content":"羽蛇：金丹，【渌水】果位，死于真螭。"},{"type":"text","content":"天一真君：金丹，【牝水】果位，死于【戊土】。"},{"type":"text","content":"上任【全丹】：金丹，重伤死于东方未明和东方未晞手里。"},{"type":"text","content":"凤麟：金丹【府水】，死于拓跋玄郯。"},{"type":"text","content":"牝水娘娘（妙道化生真君）：金丹，【牝水】果位。"},{"type":"text","content":"𫛨乌：曾经诸火主人，子孔雀长子。"},{"type":"text","content":"大孔雀：子孔雀长子，从𫛨乌处得从欲并火。"},{"type":"text","content":"参渌馥：紫府巅峰【渌水】，南疆妖王，碧馥山主，真螭第八子一脉。"},{"type":"text","content":"江伯清：紫府巅峰，紫府金丹道→巫箓道，徒江雁，被庆济方逼死。"},{"type":"text","content":"箕安真人：紫府中期【离火】。"},{"type":"text","content":"善柏真人：紫府中期【角木】。"},{"type":"text","content":"刘长迭（远变真人）：紫府前期【库金】，阵师，受大衍天玄箓感应而落的一丝推衍之力误以为自己重生。"},{"type":"text","content":"尹歆雨（况雨真人）：紫府前期【修越】。"},{"type":"text","content":"扶余：紫府前期【少阴】，被迟步梓献祭。"},{"type":"text","content":"烠孚：紫府前期【太阳】，剑仙。"},{"type":"text","content":"罗真人：紫府前期【集木】。"},{"type":"text","content":"楚逸：紫府前期【离火】，李乾元转世，已死。"},{"type":"text","content":"林枫：紫府前期【灴火】，李乾元转世，已死。"},{"type":"text","content":"竺生真人：紫府前期【玉真】，楚国帝裔。"},{"type":"text","content":"拓渡妖王：紫府前期【煞炁】。"},{"type":"text","content":"青衍妖王：紫府前期【青宣】。"},{"type":"text","content":"信蠹：紫府前期，死于隋观。"},{"type":"text","content":"献珧真人：紫府，过岭峰。"},{"type":"text","content":"夺陵：紫府，剑仙，在漆泽修行。"},{"type":"text","content":"彩赤真人：紫府，占据驹海后将其改名孔雀海。"},{"type":"text","content":"平偃真人：紫府。"},{"type":"text","content":"衔蝉真人：紫府【寒炁】，雪岭听松狸。"},{"type":"text","content":"鸲雷真人：紫府。"},{"type":"text","content":"持广真人：紫府。"},{"type":"text","content":"烛魁：紫府。"},{"type":"text","content":"谧玄蛇君：紫府【渌水】，死于上任【玉真】。"},{"type":"text","content":"苏钧：紫府，江北苏 家，打造冲阳辖星宝盘，已死。家庭"},{"type":"text","content":"襄鸮真人：紫府，裨玄门。"},{"type":"text","content":"蒋秉：为重明洞玄屏作画。"},{"type":"text","content":"阳星大雀：𫛨乌后裔，被𫛨乌赐予太阳并火。"},{"type":"text","content":"姚臣蔺"},{"type":"text","content":"姚贯夷"},{"type":"text","content":"贺町：筑基中期，炼器师，跟郁玉封有仇，帮天炀炼灵胚到油尽灯枯，寿尽。"},{"type":"text","content":"蒋合干：筑基中期【玉庭将】，复仇郁家，郁萧贵死后，潜伏郁家，害死郁慕高，后云游四方。"},{"type":"text","content":"芒花子：筑基中期【掩尘雾】。"},{"type":"text","content":"李恩熙：筑基前期，父李提，兄李恩成，恩水丹阁掌柜。"},{"type":"text","content":"公孙柏云：筑基前期【槐荫鬼】，兄公孙柏范。"},{"type":"text","content":"司元白：筑基，弟司元礼，好友于羽楔。脱离青池后失踪，疑似失踪和阴司有关。"},{"type":"text","content":"席子康：筑基【天鸣策】，北寰宗治下，已死。"},{"type":"text","content":"裘籍：筑基，魔修，第一次南北大战死于李清虹。"},{"type":"text","content":"林寿业：筑基。"},{"type":"text","content":"淳于北：筑基，第一次南北大战期间死于李玄锋。"},{"type":"text","content":"丘大王：筑基，被李曦明炼成丹药。"},{"type":"text","content":"肖远：筑基。"},{"type":"text","content":"孟泰志：练气九层，女孟灼云，炼器师，突破筑基失败身死。"},{"type":"text","content":"裴獬：练气九层，李绛夏好友。"},{"type":"text","content":"毕华轩：练气五层，散修。"},{"type":"text","content":"章牧童：练气五层，魔修，被李家围杀。"},{"type":"text","content":"鲁家家主：练气中期。"},{"type":"text","content":"许阳平：练气二层，妻林靖易，被张允所杀。"},{"type":"text","content":"何毅涛：练气前期，魔修，死于李周巍。"},{"type":"text","content":"孟灼云：练气，父孟泰志，丹师，离开李家后死于李曦峻。"},{"type":"text","content":"夏虽：练气，庆须寺主人。"},{"type":"text","content":"濮家家主：玉京轮。"},{"type":"text","content":"林靖易：玉京轮，夫许阳平，被张允所杀。"},{"type":"text","content":"韩文许：教书先生。"},{"type":"text","content":"元家余孽：刺杀李长湖后被徐三所杀。"},{"type":"text","content":"江渔女：子李渊渔。"},{"type":"text","content":"午翩：离鸾，青梧林。"},{"type":"h2","content":"修炼体系"},{"type":"h3","content":"仙修"},{"type":"text","content":"胎息境"},{"type":"text","content":"突破条件：有灵窍或接引玄珠符种。"},{"type":"text","content":"突破方法：聚集八十一缕灵气，在吉时使灵气跃过十二重楼，汇聚在泥丸宫中，凝聚成液，再流淌而下，在气海穴中聚成一片清潭，最后从中凝聚出一轮光弧即玄景轮。（十二重楼贯气海，清潭浮现玄景轮）"},{"type":"text","content":"小境界划分：共分六层（分别需聚六轮）："},{"type":"text","content":"一层玄景轮、二层承明轮、三层周行轮、四层青元轮、五层玉京轮（多出神识能用储物袋和采气）、六层灵初轮。"},{"type":"text","content":"炼气境（即炼气一~九层）"},{"type":"text","content":"突破方法：配合功法采并吞服相应天地灵气。"},{"type":"text","content":"*注：以正法采气服气即是正统炼气修士，吞服杂气即为杂气修士。（通常情况下，吞服杂气更易突破，但实力低于正统炼气修士，吞服杂气也将无法筑基成功）"},{"type":"text","content":"小境界划分：共分九层。"},{"type":"text","content":"筑基境（4境，初，中，后，巅峰）"},{"type":"text","content":"紫府境"},{"type":"text","content":"突破方法：推仙基过巨阙府，至升阳府，过蒙昧之念（短则数日，长则几十年不等，有玄珠符种则可顷刻度过），口含神通渡过无尽幻想，成就紫府"},{"type":"text","content":"小境界划分：1、2道神通为初期，3道神通为中期，4道为后期，5道为紫府巅峰；每道神通皆由仙基晋升而来。其中第4道神通很难修炼出来，短则几十年，多则上百年"},{"type":"text","content":"金丹境"},{"type":"text","content":"紫府突破金丹，关键在于煅出那一点不坏的金性，再以那金性催化神通，证得金丹。"},{"type":"text","content":"这金丹的金性非是五行之金，而是取金之不朽的意思。"},{"type":"text","content":"煅成金性，寿元一千年，只要不被司阴之人发现，金丹修士纵使死了也能凭借金性长存人间。"},{"type":"text","content":"金性是金丹的妙要所在，乃是金丹修士的神妙之源，会化为种种神物。"},{"type":"text","content":"古时金丹称作求性。"},{"type":"text","content":"修士证得金丹，即得果位，以己心代天心，往上就是道胎。"},{"type":"text","content":"道胎（元婴）境（欠更新）"},{"type":"h3","content":"仙基"},{"type":"text","content":"修士由练气突破筑基时，六轮兵解，化为流光，而后吸取气海中的真元，最终于气海中铸成一道仙基。"},{"type":"table","content":[[{"text":"阴阳","tag":"td"},{"text":"","tag":"td"},{"text":"金性","tag":"td"},{"text":"仙基","tag":"td"}],[{"text":"阴","tag":"td"},{"text":"太阴","tag":"td"},{"text":"","tag":"td"},{ function makeAnchor(text) {
  return text.replace(/[^\w\u4e00-\u9fff]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').substring(0, 50);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderContent(sections) {
  const container = document.getElementById('contentArea');
  let html = '';
  let inSection = false;
  let sectionCount = 0;

  for (const s of sections) {
    if (s.type === 'h2') {
      if (inSection) html += '</div>'; // close section-body
      if (inSection) html += '</section>';
      const anchor = makeAnchor(s.content);
      html += `<section id="section-${anchor}" class="main-section">`;
      html += `<h2 id="${anchor}" class="section-title">${escapeHtml(s.content)}</h2>`;
      html += `<div class="section-body">`;
      inSection = true;
      sectionCount++;
    } else if (s.type === 'h3') {
      const anchor = makeAnchor(s.content);
      html += `<h3 id="${anchor}" class="subsection-title">${escapeHtml(s.content)}</h3>`;
    } else if (s.type === 'text') {
      const lines = s.content.split('\n');
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        // Detect "label：value" patterns for info display
        if (trimmed.includes('：') && trimmed.indexOf('：') < 20 && trimmed.indexOf('：') === trimmed.lastIndexOf('：')) {
          const colonIdx = trimmed.indexOf('：');
          const label = trimmed.substring(0, colonIdx + 1);
          const value = trimmed.substring(colonIdx + 1);
          html += `<div class="info-line"><span class="info-label">${escapeHtml(label)}</span><span class="info-value">${escapeHtml(value)}</span></div>`;
        } else {
          html += `<p>${escapeHtml(trimmed)}</p>`;
        }
      }
    } else if (s.type === 'table') {
      const table = s.content;
      if (!table || table.length === 0) continue;
      html += '<div class="table-wrapper"><table>';
      for (let ri = 0; ri < table.length; ri++) {
        const row = table[ri];
        html += '<tr>';
        for (const cell of row) {
          const tag = ri === 0 ? 'th' : 'td';
          const text = cell.text || '';
          html += `<${tag}>${escapeHtml(text)}</${tag}>`;
        }
        html += '</tr>';
      }
      html += '</table></div>';
    } else if (s.type === 'list') {
      const tag = s.ordered ? 'ol' : 'ul';
      html += `<${tag}>`;
      for (const item of s.content) {
        html += `<li>${escapeHtml(item)}</li>`;
      }
      html += `</${tag}>`;
    }
  }

  if (inSection) html += '</div></section>';
  container.innerHTML = html;
}

function renderTOC(sections) {
  const container = document.getElementById('tocContainer');
  let html = '';
  let currentH2 = '';

  for (const s of sections) {
    if (s.type === 'h2') {
      if (currentH2) html += '</div></div>'; // close h3-group and h2-item
      currentH2 = s.content;
      const anchor = makeAnchor(s.content);
      html += `<div class="toc-h2-item" data-text="${escapeHtml(s.content)}">`;
      html += `<a href="#${anchor}" class="toc-h2-link" data-anchor="${anchor}">${escapeHtml(s.content)}</a>`;
      html += '<div class="toc-h3-group">';
    } else if (s.type === 'h3') {
      const anchor = makeAnchor(s.content);
      html += `<a href="#${anchor}" class="toc-h3-link" data-text="${escapeHtml(s.content)}" data-anchor="${anchor}">${escapeHtml(s.content)}</a>`;
    }
  }
  if (currentH2) html += '</div></div>';

  container.innerHTML = html;
}

function filterTOC(query) {
  const items = document.querySelectorAll('.toc-h2-item');
  const q = query.trim().toLowerCase();
  for (const item of items) {
    if (!q) {
      item.style.display = '';
      item.querySelectorAll('.toc-h3-link').forEach(l => l.style.display = '');
    } else {
      const h2Text = item.querySelector('.toc-h2-link').textContent.toLowerCase();
      const h3Links = item.querySelectorAll('.toc-h3-link');
      let hasMatch = h2Text.includes(q);
      for (const l of h3Links) {
        const match = l.textContent.toLowerCase().includes(q);
        l.style.display = match || !q ? '' : 'none';
        if (match) hasMatch = true;
      }
      item.style.display = hasMatch ? '' : 'none';
    }
  }
}

function initScrollSpy() {
  const backTop = document.getElementById('backTop');

  window.addEventListener('scroll', () => {
    // Back to top button
    if (window.scrollY > 400) {
      backTop.classList.add('visible');
    } else {
      backTop.classList.remove('visible');
    }

    // Highlight active TOC item
    const headings = document.querySelectorAll('h2[id], h3[id]');
    let activeId = '';
    for (const h of headings) {
      if (h.getBoundingClientRect().top < 120) {
        activeId = h.id;
      }
    }
    document.querySelectorAll('.toc-h2-link, .toc-h3-link').forEach(l => {
      l.classList.toggle('active', l.dataset.anchor === activeId);
    });
  });
}
