services:
  mariadb:
    image: mariadb:10.11
    container_name: mw-mariadb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE must be set in .env}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER must be set in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
    volumes:
      - mariadb_data:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=128M
      --key-buffer-size=16M
      --max-connections=20
      --table-open-cache=64
      --thread-cache-size=4
      --query-cache-size=0
      --query-cache-type=0
      --performance-schema=OFF
    mem_limit: 256m
    networks:
      - wiki-net

  mediawiki:
    image: mediawiki:1.42
    container_name: mw-app
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file:
      - .env
    environment:
      MW_DB_HOST: mariadb
      MW_DB_NAME: ${MYSQL_DATABASE}
      MW_DB_USER: ${MYSQL_USER}
      MW_DB_PASS: ${MYSQL_PASSWORD}
      MW_ADMIN_USER: ${MW_ADMIN_USER:?MW_ADMIN_USER must be set in .env}
      MW_ADMIN_PASS: ${MW_ADMIN_PASS:?MW_ADMIN_PASS must be set in .env}
    volumes:
      - mw_images:/var/www/html/images
      - ./LocalSettings.php:/var/www/html/LocalSettings.php:ro
      - ./apache-wiki-alias.conf:/etc/apache2/conf-enabled/wiki-alias.conf:ro
      - ./.htaccess:/var/www/html/.htaccess:ro
      - ./resources-assets:/var/www/html/resources/assets:rw
    entrypoint: ["docker-php-entrypoint"]
    command: >
      bash -c "a2enconf wiki-alias 2>/dev/null; exec apache2-foreground"
    ports:
      - "127.0.0.1:8889:80"
    mem_limit: 512m
    networks:
      - wiki-net

volumes:
  mariadb_data:
  mw_images:

networks:
  wiki-net:
